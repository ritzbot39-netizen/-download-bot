# Railway / Nixpacks build.
#
# Nixpacks auto-detects requirements.txt and builds a Python venv (pip included),
# then puts its bin dir on PATH at runtime — so `python` is the venv interpreter
# with all deps, and the bundled `deno` (yt-dlp's JS runtime for YouTube) is on
# PATH too. We only need to add ffmpeg (which ships ffprobe) on top.
[phases.setup]
aptPkgs = ["ffmpeg"]

[start]
cmd = "python bot.py"
